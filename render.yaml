services:
  - type: web
    name: opportunityradar-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: opportunityradar-db
          property: connectionString
      - key: SUPABASE_JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://opportunityradar.vercel.app
      - key: CORS_ORIGINS
        value: '["https://opportunityradar.vercel.app"]'
      - key: DEBUG
        value: false

databases:
  - name: opportunityradar-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
