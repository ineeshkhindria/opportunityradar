services:
  - type: web
    name: opportunityradar-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opportunityradar-db
          property: connectionString
      - key: SUPABASE_JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://opportunityradar.vercel.app
      - key: CORS_ORIGINS
        value: '["https://opportunityradar.vercel.app"]'
      - key: DEBUG
        value: false

databases:
  - name: opportunityradar-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
